name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    # Throwaway Postgres for the integration suites. This is NOT Neon/production — the
    # "never auto-run migrations" rule is about prod; applying them to a disposable CI DB
    # is fine, and doing it in sequence here also validates the migration files apply cleanly.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: composed_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/composed_test
      NODE_ENV: test
      # Non-secret placeholders. The Clerk/Anthropic/OpenAI SDKs are mocked in tests; these
      # only keep module-eval from failing. CANVAS_TOKEN_KEY is a valid base64 32-byte (zero)
      # key for the crypto round-trip test. OPS_WEBHOOK_URL is intentionally unset (the digest
      # must still emit without it). NEVER put real secrets in CI.
      CLERK_SECRET_KEY: sk_test_ci_placeholder
      ANTHROPIC_API_KEY: ci-placeholder
      OPENAI_API_KEY: ci-placeholder
      CANVAS_TOKEN_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      ALLOWED_ORIGINS: http://localhost:3100

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20' # matches apps/api/Dockerfile (node:20-alpine)
          cache: npm

      - name: Install (workspaces)
        run: npm ci

      - name: Ensure psql is available for the migration loop
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Apply migrations in sequence (also validates they apply cleanly)
        run: |
          for f in $(ls apps/api/drizzle/*.sql | sort); do
            echo "applying $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Ensure Next ambient types (next-env.d.ts is gitignored / regenerated by Next)
        run: |
          f=apps/web/next-env.d.ts
          [ -f "$f" ] || printf '/// <reference types="next" />\n/// <reference types="next/image-types/global" />\n' > "$f"

      - name: Typecheck (shared, api, web)
        run: npm run typecheck

      - name: Test (shared, api, web)
        run: npm test
